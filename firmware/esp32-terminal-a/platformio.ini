[platformio]
core_dir = ../../.pio-core

[env:nodemcu-32s]
platform = espressif32@6.8.1
board = nodemcu-32s
framework = espidf
monitor_speed = 115200
build_flags =
  ; Replace with real gateway STA MAC, e.g. 0x24,0x6F,0x28,0xAA,0xBB,0xCC
  -DTERMINAL_GATEWAY_MAC0=0xFF
  -DTERMINAL_GATEWAY_MAC1=0xFF
  -DTERMINAL_GATEWAY_MAC2=0xFF
  -DTERMINAL_GATEWAY_MAC3=0xFF
  -DTERMINAL_GATEWAY_MAC4=0xFF
  -DTERMINAL_GATEWAY_MAC5=0xFF
; Cross-platform serial port settings:
; Linux example:   pio run -t upload --upload-port /dev/ttyUSB0
; Windows example: pio run -t upload --upload-port COM3
